  <line class="ln l2" x1="100" y1="45" x2="40" y2="30" stroke="#378ADD"/>
  <line class="ln l4" x1="490" y1="30" x2="420" y2="60" stroke="#1D9E75"/>
  <line class="ln l6" x1="490" y1="30" x2="560" y2="30" stroke="#639922"/>
  <line class="ln l8" x1="240" y1="110" x2="150" y2="70" stroke="#BA7517"/>
