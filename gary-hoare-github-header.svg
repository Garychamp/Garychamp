<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Gary Hoare — GitHub profile header</title>
  <desc>Colourful animated particle web header for Gary Hoare</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

      @media (prefers-color-scheme: dark) {
        .bg { fill: #000000; }
        .name-text { fill: #ffffff; }
        .sub-text { fill: #999999; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .name-text { fill: #111111; }
        .sub-text { fill: #666666; }
      }

      @keyframes a1{0%,100%{transform:translate(0,0)}25%{transform:translate(14px,-11px)}50%{transform:translate(-9px,17px)}75%{transform:translate(19px,7px)}}
      @keyframes a2{0%,100%{transform:translate(0,0)}25%{transform:translate(-13px,15px)}50%{transform:translate(21px,-9px)}75%{transform:translate(-7px,19px)}}
      @keyframes a3{0%,100%{transform:translate(0,0)}25%{transform:translate(11px,19px)}50%{transform:translate(-17px,-7px)}75%{transform:translate(13px,-15px)}}
      @keyframes a4{0%,100%{transform:translate(0,0)}25%{transform:translate(-19px,-9px)}50%{transform:translate(9px,15px)}75%{transform:translate(-15px,11px)}}
      @keyframes a5{0%,100%{transform:translate(0,0)}25%{transform:translate(17px,13px)}50%{transform:translate(-11px,-19px)}75%{transform:translate(7px,17px)}}
      @keyframes a6{0%,100%{transform:translate(0,0)}25%{transform:translate(-9px,21px)}50%{transform:translate(19px,-11px)}75%{transform:translate(-21px,7px)}}
      @keyframes a7{0%,100%{transform:translate(0,0)}25%{transform:translate(12px,-18px)}50%{transform:translate(-20px,10px)}75%{transform:translate(16px,-6px)}}
      @keyframes a8{0%,100%{transform:translate(0,0)}25%{transform:translate(-16px,8px)}50%{transform:translate(14px,-20px)}75%{transform:translate(-10px,14px)}}

      .q1{animation:a1 18s ease-in-out infinite}
      .q2{animation:a2 22s ease-in-out infinite;animation-delay:-4s}
      .q3{animation:a3 16s ease-in-out infinite;animation-delay:-8s}
      .q4{animation:a4 20s ease-in-out infinite;animation-delay:-2s}
      .q5{animation:a5 24s ease-in-out infinite;animation-delay:-6s}
      .q6{animation:a6 19s ease-in-out infinite;animation-delay:-10s}
      .q7{animation:a7 21s ease-in-out infinite;animation-delay:-3s}
      .q8{animation:a8 17s ease-in-out infinite;animation-delay:-7s}
      .q9{animation:a1 23s ease-in-out infinite;animation-delay:-1s}
      .q10{animation:a2 25s ease-in-out infinite;animation-delay:-5s}
      .q11{animation:a3 15s ease-in-out infinite;animation-delay:-9s}
      .q12{animation:a4 20s ease-in-out infinite;animation-delay:-11s}
      .q13{animation:a5 18s ease-in-out infinite;animation-delay:-13s}
      .q14{animation:a6 22s ease-in-out infinite;animation-delay:-14s}
      .q15{animation:a7 16s ease-in-out infinite;animation-delay:-12s}
      .q16{animation:a8 21s ease-in-out infinite;animation-delay:-15s}
      .q17{animation:a1 19s ease-in-out infinite;animation-delay:-16s}
      .q18{animation:a2 17s ease-in-out infinite;animation-delay:-17s}
      .q19{animation:a3 24s ease-in-out infinite;animation-delay:-18s}
      .q20{animation:a4 22s ease-in-out infinite;animation-delay:-19s}
      .q21{animation:a5 20s ease-in-out infinite;animation-delay:-20s}
      .q22{animation:a6 18s ease-in-out infinite;animation-delay:-21s}
      .q23{animation:a7 23s ease-in-out infinite;animation-delay:-22s}
      .q24{animation:a8 15s ease-in-out infinite;animation-delay:-23s}
      .q25{animation:a1 25s ease-in-out infinite;animation-delay:-24s}
      .q26{animation:a2 19s ease-in-out infinite;animation-delay:-2.5s}
      .q27{animation:a3 21s ease-in-out infinite;animation-delay:-6.5s}
      .q28{animation:a4 17s ease-in-out infinite;animation-delay:-10.5s}

      @keyframes lp{0%,100%{opacity:0.10}50%{opacity:0.26}}
      .ln{stroke-width:0.5;fill:none;animation:lp ease-in-out infinite}
      .l1{animation-duration:4s}.l2{animation-duration:5s;animation-delay:-2s}
      .l3{animation-duration:6s;animation-delay:-1s}.l4{animation-duration:4.5s;animation-delay:-3s}
      .l5{animation-duration:5.5s;animation-delay:-0.5s}.l6{animation-duration:3.5s;animation-delay:-2.5s}
      .l7{animation-duration:7s;animation-delay:-3.5s}.l8{animation-duration:4s;animation-delay:-1.5s}

      .name-text{font-family:'Roboto',sans-serif;font-size:32px;font-weight:700;letter-spacing:6px;animation:fi 2s ease-out both}
      .sub-text{font-family:'Roboto',sans-serif;font-size:11px;font-weight:400;letter-spacing:4px;animation:fi 2.6s ease-out both}
      @keyframes fi{from{opacity:0}to{opacity:1}}
    </style>
  </defs>

  <rect class="bg" width="680" height="220" rx="0"/>

