  <line class="ln l7" x1="540" y1="195" x2="600" y2="140" stroke="#1D9E75"/>
  <line class="ln l8" x1="540" y1="195" x2="650" y2="170" stroke="#D4537E"/>
  <line class="ln l3" x1="150" y1="70" x2="320" y2="145" stroke="#639922"/>
  <line class="ln l1" x1="280" y1="45" x2="460" y2="155" stroke="#378ADD"/>
  <line class="ln l5" x1="420" y1="60" x2="600" y2="140" stroke="#7F77DD"/>
